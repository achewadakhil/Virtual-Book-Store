server.port=8091
spring.application.name = VirtualBookStore
# server.port = 8085

spring.datasource.url=${SQL_URL:jdbc:mysql://localhost:3306/bookstore?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SQL_USER:root}
spring.datasource.password=${SQL_PASS:}
# spring.datasource.driver-class-name=

# Flyway migration configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
# If your DB already has tables, Flyway starts tracking from V1 without breaking startup.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Strict mode: Hibernate validates schema but does not auto-create/alter tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-to-32-bytes-minimum-12345}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

