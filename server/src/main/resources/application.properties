spring.application.name = VirtualBookStore

spring.datasource.url=jdbc:mysql://localhost:3306/bookstore
spring.datasource.username=root
spring.datasource.password=${SQL_PASS}
# spring.datasource.driver-class-name=

# spring.h

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-to-32-bytes-minimum-12345}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

